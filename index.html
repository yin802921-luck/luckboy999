<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>吞食蛇小游戏</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-labelledby="game-title">
      <section class="hero-card">
        <p class="eyebrow">Classic Arcade</p>
        <h1 id="game-title">吞食蛇小游戏</h1>
        <p class="intro">
          控制小蛇吃掉发光的果实，越吃越长。撞到墙壁或自己的身体就会结束游戏。
        </p>

        <div class="score-board" aria-label="游戏分数">
          <div>
            <span>当前分数</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span>最高分</span>
            <strong id="best-score">0</strong>
          </div>
        </div>

        <div class="button-row">
          <button id="start-button" type="button">开始游戏</button>
          <button id="pause-button" type="button" class="secondary" disabled>暂停</button>
        </div>
      </section>

      <section class="board-card" aria-label="吞食蛇游戏区域">
        <canvas id="game-board" width="520" height="520" aria-label="游戏棋盘"></canvas>
        <div id="message" class="message" role="status" aria-live="polite">
          按“开始游戏”或空格键开始
        </div>
      </section>

      <section class="controls-card" aria-label="操作说明">
        <h2>操作方式</h2>
        <ul>
          <li>方向键 / WASD：改变移动方向</li>
          <li>空格键：开始或重新开始</li>
          <li>P 键：暂停或继续</li>
        </ul>
        <div class="touch-controls" aria-label="触屏方向键">
          <button data-direction="up" aria-label="向上">▲</button>
          <button data-direction="left" aria-label="向左">◀</button>
          <button data-direction="right" aria-label="向右">▶</button>
          <button data-direction="down" aria-label="向下">▼</button>
        </div>
      </section>
    </main>

    <script src="src/game.js"></script>
  </body>
</html>
